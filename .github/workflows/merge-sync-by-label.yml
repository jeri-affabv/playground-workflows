name: Reusable Merge Syncing by Label
on:
  workflow_call:
    # No secrets needed! GITHUB_TOKEN is provided automatically.
    # Requires `Allow GitHub Actions to create and approve pull requests` enabled in settings.

jobs:
  sync:
    if: github.event.action == 'labeled' && github.event.label.name == 'affable-merge-sync'
    runs-on: ubuntu-latest
    permissions:
      # required to approve, add comments, and remove labels
      pull-requests: write
      # required to merge
      contents: write

    steps:
      - name: Strict Validation and Merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          JOB_NAME: "sync" 
        run: |
          # 1. Fetch raw PR data
          RAW_JSON=$(gh pr view "$PR_URL" --json mergeStateStatus,statusCheckRollup,headRefName,baseRefName,isDraft)

          STATE=$(echo "$RAW_JSON" | jq -r '.mergeStateStatus')
          HEAD=$(echo "$RAW_JSON" | jq -r '.headRefName')
          BASE=$(echo "$RAW_JSON" | jq -r '.baseRefName')
          IS_DRAFT=$(echo "$RAW_JSON" | jq -r '.isDraft')

          # 2. Extract checks into a format Bash can loop through safely
          # Example:
          # call-sync / sync|sync|SUCCESS|success
          # test|test|PENDING|null
          ALL_CHECKS=$(echo "$RAW_JSON" | jq -r '.statusCheckRollup[] | "\(.name)|\(.context)|\(.state)|\(.conclusion)"')

          OTHER_FAILURES=""
          OTHER_PENDING=""
          OTHER_COUNT=0
          SELF_COUNT=0

          # Differentiate check by this workflow from other workflows so we don't tag the PR as waiting for checks when only this workflow is running
          while IFS="|" read -r c_name c_context c_state c_conclusion; do
              # Determine if this check is by this workflow itself
              is_self=0
              if [[ "$c_name" == "$JOB_NAME" ]] || [[ "$c_context" == "$JOB_NAME" ]] || [[ "$c_name" == *" / $JOB_NAME" ]]; then
                  is_self=1
              fi

              if [ "$is_self" -eq 1 ]; then
                  SELF_COUNT=$((SELF_COUNT + 1))
              else
                  OTHER_COUNT=$((OTHER_COUNT + 1))
                  # If both are not SUCCESS, it's not green
                  if [[ "$c_state" != "SUCCESS" ]] && [[ "$c_conclusion" != "SUCCESS" ]]; then
                      if [[ "$c_state" == "FAILURE" ]] || [[ "$c_conclusion" == "FAILURE" ]]; then
                          OTHER_FAILURES="$OTHER_FAILURES $c_name"
                      else
                          OTHER_PENDING="$OTHER_PENDING $c_name"
                      fi
                  fi
              fi
          done <<< "$ALL_CHECKS"

          echo "PR State: $STATE | Draft: $IS_DRAFT"
          echo "Internal instances ignored: $SELF_COUNT"
          echo "External checks found: $OTHER_COUNT"

          # 3. Validation Gates
          if [[ "$IS_DRAFT" == "true" ]]; then
              echo "Error: PR is a Draft."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              gh pr comment "$PR_URL" --body "❌ **Sync Blocked:** Mark the PR as 'Ready for Review' first."
              exit 1
          fi

          IS_SYNC_PAIR=0
          if [[ "$HEAD" == "dev" && "$BASE" == "main" ]]; then IS_SYNC_PAIR=1; fi
          if [[ "$HEAD" == "main" && "$BASE" == "dev" ]]; then IS_SYNC_PAIR=1; fi

          if [ "$IS_SYNC_PAIR" -eq 0 ]; then
              echo "Error: Invalid sync pair ($HEAD -> $BASE)."
              gh pr comment "$PR_URL" --body "❌ **Invalid:** Only dev<->main PRs are allowed for this action."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
          fi

          if [[ -n "$OTHER_FAILURES" ]]; then
              echo "Blocking: External CI failed: $OTHER_FAILURES"
              gh pr comment "$PR_URL" --body "❌ **Sync Blocked: CI Failed.** Fix CI before re-adding label. Fix: $OTHER_FAILURES"
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
          fi

          if [[ -n "$OTHER_PENDING" ]]; then
              echo "Aborting: External CI incomplete: $OTHER_PENDING"
              gh pr comment "$PR_URL" --body "⏳ **Sync Aborted: CI Incomplete.** Wait for CI to complete before re-adding label. Waiting on: $OTHER_PENDING"
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
          fi

          # 4. Evaluation
          PROCEED=0
          if [[ "$STATE" == "CLEAN" ]] || [[ "$STATE" == "BLOCKED" ]]; then
              PROCEED=1
          # Branch can be in an unstable state while there's a remaining action (like this one itself)
          elif [[ "$STATE" == "UNSTABLE" ]]; then
              echo "State is UNSTABLE, but external checks are green. Proceeding..."
              PROCEED=1
          fi

          # 5. Execution (Approve then Merge)
          if [ "$PROCEED" -eq 1 ]; then
              echo "Attempting to satisfy branch protections with self-approval..."
              gh pr review "$PR_URL" --approve || echo "Approval failed or already approved."

              echo "Attempting merge..."
              if gh pr merge "$PR_URL" --merge --admin; then
                  echo "Success: PR Merged."
                  exit 0
              else
                  echo "Error: GitHub API rejected the merge."
                  gh pr comment "$PR_URL" --body "❌ **Merge Failed:** GitHub rejected the request to merge this PR."
                  gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
                  exit 1
              fi
          else
              echo "Error: PR state ($STATE) not ready."
              gh pr comment "$PR_URL" --body "❌ **Sync Aborted:** PR state ($STATE) not ready."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
          fi
