name: Reusable Merge Syncing by Label
on:
  workflow_call:
    # No secrets needed! GITHUB_TOKEN is provided automatically.
    # Requires `Allow GitHub Actions to create and approve pull requests` enabled in settings.

jobs:
  sync:
    if: contains(github.event.pull_request.labels.*.name, 'affable-merge-sync') || github.event.label.name == 'affable-merge-sync'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Strict Validation and Merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          JOB_NAME: "sync"
        run: |
          # 1. Fetch raw data
          RAW_JSON=$(gh pr view "$PR_URL" --json mergeStateStatus,statusCheckRollup,headRefName,baseRefName)

          # 2. Extract basic fields using simple JQ (no complex filters here)
          STATE=$(echo "$RAW_JSON" | jq -r '.mergeStateStatus')
          HEAD=$(echo "$RAW_JSON" | jq -r '.headRefName')
          BASE=$(echo "$RAW_JSON" | jq -r '.baseRefName')

          # 3. Handle 'Other' checks by getting the full list and filtering via grep/bash 
          # This avoids the "quote-in-quote" JQ regex nightmare.
          # We extract Name, Context, and State for every check.
          ALL_CHECKS=$(echo "$RAW_JSON" | jq -r '.statusCheckRollup[] | "\(.name)|\(.context)|\(.state)|\(.conclusion)"')

          OTHER_FAILURES=""
          OTHER_PENDING=""
          OTHER_COUNT=0
          SELF_COUNT=0

          while IFS="|" read -r c_name c_context c_state c_conclusion; do
              # Determine if this check is 'us'
              # We check if name or context matches "sync" or ends with "/ sync"
              is_self=0
              if [[ "$c_name" == "$JOB_NAME" ]] || [[ "$c_context" == "$JOB_NAME" ]] || [[ "$c_name" == *" / $JOB_NAME" ]]; then
                  is_self=1
              fi

              if [ "$is_self" -eq 1 ]; then
                  SELF_COUNT=$((SELF_COUNT + 1))
              else
                  OTHER_COUNT=$((OTHER_COUNT + 1))
                  # Check if it is NOT successful
                  if [[ "$c_state" != "SUCCESS" ]] && [[ "$c_conclusion" != "SUCCESS" ]]; then
                      # It's a failure or pending
                      if [[ "$c_state" == "FAILURE" ]] || [[ "$c_conclusion" == "FAILURE" ]]; then
                          OTHER_FAILURES="$OTHER_FAILURES $c_name"
                      else
                          OTHER_PENDING="$OTHER_PENDING $c_name"
                      fi
                  fi
              fi
          done <<< "$ALL_CHECKS"

          echo "PR State: $STATE"
          echo "Internal instances ignored: $SELF_COUNT"
          echo "External checks found: $OTHER_COUNT"

          # 4. Branch Gate
          IS_SYNC_PAIR=0
          if [[ "$HEAD" == "dev" ]] && [[ "$BASE" == "main" ]]; then IS_SYNC_PAIR=1; fi
          if [[ "$HEAD" == "main" ]] && [[ "$BASE" == "dev" ]]; then IS_SYNC_PAIR=1; fi

          if [ "$IS_SYNC_PAIR" -eq 0 ]; then
              echo "Error: Not a recognized sync pair ($HEAD -> $BASE)."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 0
          fi

          # 5. External Action Gate
          if [[ -n "$OTHER_FAILURES" ]]; then
              echo "Blocking: External CI failed: $OTHER_FAILURES"
              gh pr comment "$PR_URL" --body "Merge Blocked: CI Failed. Fix failures in:$OTHER_FAILURES"
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 0
          fi

          if [[ -n "$OTHER_PENDING" ]]; then
              echo "Pausing: External CI incomplete: $OTHER_PENDING"
              gh pr comment "$PR_URL" --body "Merge Paused: CI Incomplete. Waiting on:$OTHER_PENDING"
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 0
          fi

          # 6. Final Evaluation
          PROCEED=0
          if [[ "$STATE" == "CLEAN" ]] || [[ "$STATE" == "BLOCKED" ]]; then
              PROCEED=1
          elif [[ "$STATE" == "UNSTABLE" ]]; then
              echo "State is UNSTABLE, but external checks are green. Logic: Self-induced."
              PROCEED=1
          fi

          # 7. Merge Execution
          if [ "$PROCEED" -eq 1 ]; then
              echo "Attempting merge..."
              if gh pr merge "$PR_URL" --merge --admin; then
                  echo "Success: PR Merged."
              else
                  echo "Error: GitHub API rejected the merge."
                  gh pr comment "$PR_URL" --body "Merge Failed: GitHub rejected the request. Ensure the branch is not a Draft and is up to date."
                  gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
                  exit 1
              fi
          else
              echo "Error: PR state ($STATE) is not ready."
              gh pr comment "$PR_URL" --body "Merge Blocked: PR state is $STATE. Complete all requirements first."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
          fi
