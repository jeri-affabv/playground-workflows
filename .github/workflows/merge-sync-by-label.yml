name: Reusable Merge Syncing by Label
on:
  workflow_call:
    # No secrets needed! GITHUB_TOKEN is provided automatically.
    # Requires `Allow GitHub Actions to create and approve pull requests` enabled in settings.

jobs:
  sync:
    if: contains(github.event.pull_request.labels.*.name, 'affable-merge-sync') || github.event.label.name == 'affable-merge-sync'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Strict Validation and Merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          JOB_NAME: "sync"
        run: |
          # 1. Fetch data
          RAW_JSON=$(gh pr view "$PR_URL" --json mergeStateStatus,statusCheckRollup,headRefName,baseRefName)
          
          # 2. Extract and Filter (with Null-Safety)
          # We use ( .name // "" ) to provide an empty string default if the field is null.
          SELF_COUNT=$(echo "$RAW_JSON" | jq -r --arg JOB "$JOB_NAME" '.statusCheckRollup[] | select((( .name // "" ) | test("(.*/ )?" + $JOB + "$")) or (( .context // "" ) | test("(.*/ )?" + $JOB + "$"))) | .name' | wc -l)
          
          PR_DATA=$(echo "$RAW_JSON" | jq -c --arg JOB "$JOB_NAME" '{
            state: .mergeStateStatus, 
            head: .headRefName, 
            base: .baseRefName,
            others: [.statusCheckRollup[] | select(
              ((( .name // "" ) | test("(.*/ )?" + $JOB + "$")) or (( .context // "" ) | test("(.*/ )?" + $JOB + "$")) | not) and
              (.name != "Strict Validation and Merge")
            )]
          }')
          
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          OTHER_COUNT=$(echo "$PR_DATA" | jq '.others | length')
          HEAD=$(echo "$PR_DATA" | jq -r '.head')
          BASE=$(echo "$PR_DATA" | jq -r '.base')
          
          # 3. List all checks that aren't SUCCESS (Pending, Failed, etc.)
          NON_SUCCESS_OTHERS=$(echo "$PR_DATA" | jq -r '.others[] | select(.conclusion != "SUCCESS" and .state != "SUCCESS") | .name' 2>/dev/null | xargs)

          echo "📊 PR State: $STATE"
          echo "🤖 Internal Sync instances ignored: $SELF_COUNT"
          echo "🔢 Total External Checks Found: $OTHER_COUNT"

          # 4. Branch Gate
          if [[ ! (("$HEAD" == "dev" && "$BASE" == "main") || ("$HEAD" == "main" && "$BASE" == "dev")) ]]; then
            echo "🚫 Not a recognized sync pair. Removing label."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 0
          fi

          # 5. The External Action Gate
          if [ -n "$NON_SUCCESS_OTHERS" ]; then
            echo "⏳ Other checks are not green: $NON_SUCCESS_OTHERS"
            
            if echo "$PR_DATA" | jq -r '.others[] | .conclusion, .state' | grep -q "FAILURE"; then
               gh pr comment "$PR_URL" --body "❌ **Sync Blocked: CI Failed.** Checks failed: $NON_SUCCESS_OTHERS. Fix, then re-add label."
            else
               gh pr comment "$PR_URL" --body "⏳ **Sync Paused: CI Incomplete.** Waiting on: $NON_SUCCESS_OTHERS. Re-add label once green."
            fi
            
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 0
          fi

          # 6. Final Evaluation
          PROCEED=false
          if [[ "$STATE" == "CLEAN" || "$STATE" == "BLOCKED" ]]; then
            PROCEED=true
          elif [[ "$STATE" == "UNSTABLE" ]]; then
            echo "⚠️ State is UNSTABLE, but all $OTHER_COUNT external checks are SUCCESS."
            echo "✅ Conclusion: Instability is self-induced. Proceeding..."
            PROCEED=true
          fi

          if [ "$PROCEED" = true ]; then
            echo "🚀 Attempting merge..."
            if gh pr merge "$PR_URL" --merge --admin; then
              echo "✅ Successfully synced!"
            else
              gh pr comment "$PR_URL" --body "⚠️ **Merge Failed:** State is $STATE. Branch may be out of sync."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
            fi
          else
            gh pr comment "$PR
