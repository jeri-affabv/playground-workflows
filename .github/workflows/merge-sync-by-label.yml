name: Reusable Merge Syncing by Label
on:
  workflow_call:
    # No secrets needed! GITHUB_TOKEN is provided automatically by the Github Action bot.
    # Requires `Allow GitHub Actions to create and approve pull requests` enabled in the repository.

jobs:
  sync:
    if: contains(github.event.pull_request.labels.*.name, 'affable-merge-sync') || github.event.label.name == 'affable-merge-sync'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Strict Validation and Merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # 1. Fetch PR Data
          PR_DATA=$(gh pr view "$PR_URL" --json mergeStateStatus,statusCheckRollup,headRefName,baseRefName --jq '{state: .mergeStateStatus, checks: .statusCheckRollup, head: .headRefName, base: .baseRefName}')
          
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          HEAD=$(echo "$PR_DATA" | jq -r '.head')
          BASE=$(echo "$PR_DATA" | jq -r '.base')
          CHECK_STATES=$(echo "$PR_DATA" | jq -r '.checks[].state' 2>/dev/null || echo "")

          echo "📊 PR State: $STATE"
          echo "🔄 Branches: $HEAD -> $BASE"
          echo "🧪 Checks: $(echo "$CHECK_STATES" | tr '\n' ' ')"

          # 2. Safety Gate: Branch Pair
          if [[ ! (("$HEAD" == "dev" && "$BASE" == "main") || ("$HEAD" == "main" && "$BASE" == "dev")) ]]; then
            echo "🚫 Not a dev-main, main-dev sync PR. Removing label."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 0
          fi

          # 3. Categorized Exit (Fail/Pending)
          if [ "$STATE" == "DIRTY" ]; then
            gh pr comment "$PR_URL" --body "❌ **Sync Blocked: Conflicts.** Resolve merge conflicts and wait for checks, then re-add label."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 1
          fi

          if echo "$CHECK_STATES" | grep -q "FAILURE"; then
            gh pr comment "$PR_URL" --body "❌ **Sync Blocked: CI Failed.** Fix failed checks, then re-add label."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 1
          fi

          if echo "$CHECK_STATES" | grep -qE "PENDING|IN_PROGRESS|EXPECTED|UNSTABLE"; then
            gh pr comment "$PR_URL" --body "⏳ **Sync Paused: CI Still Running.** Re-add label once checks are green."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 0
          fi

          # 4. Final 'Ready' Check
          # We accept CLEAN (met everything) or BLOCKED (likely just missing human reviews)
          # We REJECT Drafts, Behind, or Unknown states.
          if [[ "$STATE" == "CLEAN" || "$STATE" == "BLOCKED" ]]; then
            echo "🚀 PR is READY. Merging $HEAD into $BASE..."
            gh pr merge "$PR_URL" --merge --admin
          else
            gh pr comment "$PR_URL" --body "⚠️ **Sync Blocked: Unready State ($STATE).**
            The PR is in a state that cannot be merged automatically (it may be a Draft or Out-of-Date). Make sure PR is READY before re-adding label."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 1
          fi
