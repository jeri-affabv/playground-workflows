- name: Strict Validation and Merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Use both the workflow name and the job ID to ensure we find "ourselves"
          WF_NAME: "Reusable Merge Syncing by Label"
          JOB_ID: "sync"
        run: |
          # 1. Fetch data
          RAW_JSON=$(gh pr view "$PR_URL" --json mergeStateStatus,statusCheckRollup,headRefName,baseRefName)
          
          # 2. Isolate "Other" checks
          # We REMOVE the '.state != null' filter so we can actually see PENDING checks.
          # We filter out this workflow by name, job ID, and the "caller" name.
          PR_DATA=$(echo "$RAW_JSON" | jq -c --arg WF "$WF_NAME" --arg JOB "$JOB_ID" '{
            state: .mergeStateStatus, 
            head: .headRefName, 
            base: .baseRefName,
            others: [.statusCheckRollup[] | select(
              (.context != $WF and .name != $WF) and 
              (.context != $JOB and .name != $JOB) and
              (.name != "Strict Validation and Merge")
            )]
          }')
          
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          HEAD=$(echo "$PR_DATA" | jq -r '.head')
          BASE=$(echo "$PR_DATA" | jq -r '.base')
          
          # 3. Analyze "Other" Checks
          OTHER_CHECK_COUNT=$(echo "$PR_DATA" | jq '.others | length')
          
          # A check is "Non-Success" if both its 'conclusion' and 'state' are not SUCCESS
          # This captures PENDING (null), FAILURE, and CANCELLED.
          NON_SUCCESS_OTHERS=$(echo "$PR_DATA" | jq -r '.others[] | select(.conclusion != "SUCCESS" and .state != "SUCCESS") | .name' 2>/dev/null)

          echo "📊 PR State: $STATE"
          echo "🔢 Total Other Checks Found: $OTHER_CHECK_COUNT"

          # 4. Branch Gate
          if [[ ! (("$HEAD" == "dev" && "$BASE" == "main") || ("$HEAD" == "main" && "$BASE" == "dev")) ]]; then
            echo "🚫 Not a recognized sync pair. Removing label."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 0
          fi

          # 5. Handle Other Running/Failing CI
          if [ -n "$NON_SUCCESS_OTHERS" ]; then
            echo "⏳ Other checks are not green: $NON_SUCCESS_OTHERS"
            
            # Check for hard failures in others
            if echo "$PR_DATA" | jq -r '.others[] | .conclusion, .state' | grep -q "FAILURE"; then
               gh pr comment "$PR_URL" --body "❌ **Sync Blocked: CI Failed.** External checks are failing. Fix, then re-add label."
               gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
               exit 1
            fi
            
            # If not failed, they are just still running
            echo "⏳ Waiting for other CI to finish..."
            exit 0
          fi

          # 6. Final Evaluation
          # If we reach here, NON_SUCCESS_OTHERS is empty (meaning all others are SUCCESS or there are no others).
          PROCEED=false
          if [[ "$STATE" == "CLEAN" || "$STATE" == "BLOCKED" ]]; then
            PROCEED=true
          elif [[ "$STATE" == "UNSTABLE" ]]; then
            # Since NON_SUCCESS_OTHERS is empty, the UNSTABLE state MUST be caused by 'this' running action.
            echo "⚠️ State is UNSTABLE, but all ($OTHER_CHECK_COUNT) external checks are SUCCESS."
            echo "✅ Conclusion: Instability is self-induced. Proceeding..."
            PROCEED=true
          fi

          if [ "$PROCEED" = true ]; then
            echo "🚀 Attempting merge for $HEAD -> $BASE..."
            if gh pr merge "$PR_URL" --merge --admin; then
              echo "✅ Successfully synced!"
            else
              gh pr comment "$PR_URL" --body "⚠️ **Merge Failed:** State is $STATE. Branch may be out of date."
              gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
              exit 1
            fi
          else
            echo "❌ State is $STATE and conditions for bypass weren't met."
            gh pr edit "$PR_URL" --remove-label "affable-merge-sync"
            exit 1
          fi
